<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Điểm danh AI Live - Anti Spoofing</title>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f1f5f9; text-align: center; margin: 0; padding: 10px; }
    .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { color: #1e3a8a; margin-bottom: 5px; }
    input[type="text"] { width: 85%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; text-align: center; margin-bottom: 15px; outline: none; }
    button { width: 90%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    button:disabled { background-color: #94a3b8; }
    #msgBox { margin-top: 15px; font-size: 14px; font-weight: bold; padding: 10px; border-radius: 6px; display: none; }
    
    #liveCameraContainer { display: none; margin-top: 15px; position: relative; width: 100%; border-radius: 8px; overflow: hidden; border: 3px solid #10b981; box-sizing: border-box; }
    video { width: 100%; height: auto; display: block; transform: scaleX(-1); }
    .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background-color: rgba(16, 185, 129, 0.8); box-shadow: 0 0 10px #10b981; animation: scan 2s linear infinite; }
    @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    #anhGoc { display: none; }

    /* --- CSS CHO MÀN HÌNH POP-UP CHÚC MỪNG --- */
    #successModal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; padding: 25px 20px; border-radius: 12px; text-align: center; width: 80%; max-width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .checkmark { color: #10b981; font-size: 60px; margin-bottom: 10px; line-height: 1; }
    .modal-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #10b981; margin-bottom: 10px; }
    .hs-name { font-size: 20px; font-weight: bold; color: #1e3a8a; margin: 5px 0; }
    .hs-time { font-size: 14px; color: #64748b; font-style: italic; }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <h2>ĐIỂM DANH AI - BẢO MẬT KÉP</h2>
    <p>Hệ thống năm học 2026-2027</p>
    
    <input type="text" id="ma_hs" placeholder="Nhập Mã số học sinh">
    <button id="btnSubmit" onclick="batDauTienTrinh()">Xác minh Khuôn mặt</button>
    
    <div id="liveCameraContainer">
      <video id="videoLive" autoplay muted playsinline></video>
      <div class="scan-line"></div>
    </div>
    
    <img id="anhGoc" crossorigin="anonymous">
    <div id="msgBox"></div>
  </div>

  <!-- KHUNG POP-UP CHÚC MỪNG BỊ ẨN ĐI -->
  <div id="successModal">
    <div class="modal-content">
      <div class="checkmark">✓</div>
      <img id="modalImage" class="modal-img" src="">
      <div class="hs-name" id="modalName">Tên Học Sinh</div>
      <div class="hs-time" id="modalTime">Thời gian</div>
      <p style="color: #10b981; font-weight: bold; font-size: 14px; margin-top: 15px;">Điểm danh thành công!</p>
    </div>
  </div>

  <script>
    // =========================================================
    // ⚠️ QUAN TRỌNG: DÁN ĐƯỜNG LINK /EXEC CỦA THẦY VÀO ĐÂY:
    // =========================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxplalGTcqAhfmg0Diy3GBmzfMnBYHW9d9HDqVetJFK56_DAT-FYE7jcbK2_Yy0I0OI/exec"; 

    const videoLive = document.getElementById('videoLive');
    const anhGoc = document.getElementById('anhGoc');
    const btnSubmit = document.getElementById('btnSubmit');
    const maHsInput = document.getElementById('ma_hs');
    const cameraContainer = document.getElementById('liveCameraContainer');
    
    let aiLoaded = false;
    let thongTinTam = {};
    let luongVideo = null;
    let vongLapQuetAI = null;

    // Hàm tạo âm thanh tiếng Bíp ngắn gọn
    function phatAmThanhBip() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1000, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }

    function hienThiThongBao(mauSac, noiDung) {
      const box = document.getElementById("msgBox");
      box.style.display = "block";
      box.style.backgroundColor = mauSac === "xanh" ? "#dcfce7" : (mauSac === "do" ? "#ffe4e6" : (mauSac === "cam" ? "#ffedd5" : "#fbf8cc"));
      box.style.color = mauSac === "xanh" ? "#166534" : (mauSac === "do" ? "#9f1239" : (mauSac === "cam" ? "#c2410c" : "#856404"));
      box.innerText = noiDung;
    }

    function tinhKhoangCachDiem(p1, p2) {
      return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    function tinhEAR(eye) {
      const doc1 = tinhKhoangCachDiem(eye[1], eye[5]);
      const doc2 = tinhKhoangCachDiem(eye[2], eye[4]);
      const ngang = tinhKhoangCachDiem(eye[0], eye[3]);
      return (doc1 + doc2) / (2.0 * ngang);
    }

    async function goiApiGoogle(duLieu) {
      const response = await fetch(API_URL, {
        method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(duLieu)
      });
      const text = await response.text();
      try { return JSON.parse(text); } catch (e) { throw new Error("Dữ liệu phản hồi bị lỗi."); }
    }

    async function batDauTienTrinh() {
      const ma = maHsInput.value.trim();
      if (ma === "") { alert("Vui lòng nhập Mã số!"); return; }
      
      btnSubmit.disabled = true;
      hienThiThongBao("vang", "Đang kết nối Máy chủ...");

      try {
        const res = await goiApiGoogle({ action: "kiem_tra", ma_hs: ma });
        if (res.hople) {
          anhGoc.src = res.link_anh;
          thongTinTam = { ma: ma, ten: res.ho_ten, anh: res.link_anh };
          taiMoHinhAI();
        } else {
          hienThiThongBao("do", res.noi_dung);
          btnSubmit.disabled = false;
        }
      } catch (err) {
        hienThiThongBao("do", "Lỗi Mạng: Vui lòng kiểm tra lại link API.");
        btnSubmit.disabled = false;
      }
    }

    async function taiMoHinhAI() {
      if (!aiLoaded) {
        hienThiThongBao("vang", "Đang nạp AI Chống gian lận...");
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        aiLoaded = true;
      }
      khoiDongCameraLive();
    }

    async function khoiDongCameraLive() {
      btnSubmit.style.display = "none";
      maHsInput.style.display = "none";
      hienThiThongBao("vang", "Xin chào " + thongTinTam.ten + ". Hãy nhìn vào Camera!");
      
      try {
        luongVideo = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        videoLive.srcObject = luongVideo;
        cameraContainer.style.display = "block";
        videoLive.onloadedmetadata = () => { tienHanhQuetLienTuc(); };
      } catch (err) {
        hienThiThongBao("do", "Lỗi: Không thể mở Camera.");
        khopKhongThanhCong();
      }
    }

    async function tienHanhQuetLienTuc() {
      try {
        if (anhGoc.naturalWidth === 0) { tatCamera(); hienThiThongBao("do", "Lỗi tải ảnh gốc."); return; }
        const nhanDienGoc = await faceapi.detectSingleFace(anhGoc).withFaceLandmarks().withFaceDescriptor();
        if (!nhanDienGoc) { tatCamera(); hienThiThongBao("do", "Ảnh gốc không rõ mặt."); return; }

        let soLanKhongThayMat = 0;
        let trangThaiQuet = "DANG_SO_KHOP"; 
        let isProcessing = false; 

        vongLapQuetAI = setInterval(async () => {
          if (isProcessing) return; 
          isProcessing = true;

          try {
            const nhanDienLive = await faceapi.detectSingleFace(videoLive).withFaceLandmarks().withFaceDescriptor();
            
            if (nhanDienLive) {
              soLanKhongThayMat = 0; 
              if (trangThaiQuet === "DANG_SO_KHOP") {
                const khoangCach = faceapi.euclideanDistance(nhanDienGoc.descriptor, nhanDienLive.descriptor);
                if (khoangCach < 0.55) {
                  trangThaiQuet = "CHO_CHOP_MAT";
                  hienThiThongBao("cam", "CHÍNH CHỦ! Vui lòng CHỚP MẮT để xác nhận.");
                }
              } 
              else if (trangThaiQuet === "CHO_CHOP_MAT") {
                const matTrai = nhanDienLive.landmarks.getLeftEye();
                const matPhai = nhanDienLive.landmarks.getRightEye();
                const earTrungBinh = (tinhEAR(matTrai) + tinhEAR(matPhai)) / 2.0;

                // Ngưỡng EAR 0.28 để nhận diện nhạy hơn
                if (earTrungBinh < 0.28) {
                  clearInterval(vongLapQuetAI); 
                  tatCamera(); 
                  tienHanhLayGPS(); 
                }
              }
            } else {
              soLanKhongThayMat++;
              if (soLanKhongThayMat > 50) { 
                clearInterval(vongLapQuetAI); tatCamera(); hienThiThongBao("do", "Hết thời gian quét."); khopKhongThanhCong();
              }
            }
          } catch (err) {}
          isProcessing = false; 
        }, 100); // Tốc độ quét nhanh 100ms
        
      } catch (e) {
        tatCamera(); hienThiThongBao("do", "Lỗi AI: " + e.message);
      }
    }

    function tatCamera() {
      if (luongVideo) { luongVideo.getTracks().forEach(track => track.stop()); }
      cameraContainer.style.display = "none";
    }

    function khopKhongThanhCong() {
      btnSubmit.style.display = "block"; btnSubmit.innerText = "Thử lại"; btnSubmit.disabled = false; maHsInput.style.display = "block";
    }

    function tienHanhLayGPS() {
      hienThiThongBao("vang", "Xác thực thành công! Đang lấy GPS...");
      
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          async function(position) {
            try {
              const res = await goiApiGoogle({ action: "diem_danh", ma_hs: thongTinTam.ma, vi_do: position.coords.latitude, kinh_do: position.coords.longitude });
              if (res.trang_thai === "Hop_le") {
                
                // 1. Phát âm thanh tiếng Bíp
                phatAmThanhBip();
                
                // 2. Ẩn thông báo cũ và Camera
                document.getElementById('msgBox').style.display = "none";
                
                // 3. Hiển thị Pop-up đẹp mắt
                document.getElementById('modalImage').src = thongTinTam.anh;
                document.getElementById('modalName').innerText = res.ho_ten;
                
                // Lấy giờ hiện tại hiển thị lên Pop-up
                const now = new Date();
                const gioPhut = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                const ngayThang = now.getDate().toString().padStart(2, '0') + "/" + (now.getMonth()+1).toString().padStart(2, '0');
                document.getElementById('modalTime').innerText = "Vào lúc: " + gioPhut + " - " + ngayThang;
                
                document.getElementById('successModal').style.display = "flex";
                
                // Tự động tải lại trang sau 3.5 giây để sẵn sàng cho học sinh tiếp theo
                setTimeout(() => { location.reload(); }, 3500); 
                
              } else {
                hienThiThongBao("do", "Sai vị trí phòng học! (Cách xa: " + res.khoang_cach + "m).");
                khopKhongThanhCong();
              }
            } catch (err) {
              hienThiThongBao("do", "Lỗi gửi dữ liệu lên máy chủ.");
              khopKhongThanhCong();
            }
          },
          function(error) { hienThiThongBao("do", "Lỗi GPS. Hãy bật Định vị."); khopKhongThanhCong(); },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }
    }
  </script>
</body>
</html>
